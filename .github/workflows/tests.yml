name: EditMode Tests

# push is limited to main: PR branches already run via pull_request, and the
# unrestricted pair double-ran every Unity job (license activation + minutes ×2).
on:
  push:
    branches: [main]
  pull_request:

# Supersede in-flight runs of the same ref — only the newest push matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# game-ci/unity-test-runner posts test results as a GitHub Check (uses
# `checks: write`); it also needs `contents: read` for the checkout. Without
# these, the action runs the test suite successfully but fails at "Posting
# results" with "Resource not accessible by integration".
permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      # Fail fast if the pinned unityVersion drifts from the project — game-ci
      # would otherwise license-activate and run against the wrong editor.
      - name: Verify pinned Unity version matches ProjectVersion.txt
        run: |
          project="$(grep -m1 '^m_EditorVersion:' ProjectSettings/ProjectVersion.txt | awk '{print $2}')"
          pinned="$(grep -m1 '^ *unityVersion:' .github/workflows/tests.yml | awk '{print $2}')"
          if [ "$project" != "$pinned" ]; then
            echo "::error file=.github/workflows/tests.yml::unityVersion '$pinned' != ProjectVersion.txt '$project' — update the pin"
            exit 1
          fi
          echo "Unity version pin OK: $pinned"

      # Cache Library/ keyed on the inputs that drive its content. Library/
      # itself is gitignored, so hashing it would produce a constant key and
      # the cache would never invalidate.
      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: .
          unityVersion: 6000.5.0f1
          testMode: editmode
          artifactsPath: artifacts
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: EditMode Test Results
          path: artifacts
